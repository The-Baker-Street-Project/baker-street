apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-backup-egress
  namespace: bakerst
spec:
  podSelector:
    matchLabels:
      app: bakerst-backup
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: qdrant
      ports:
        - protocol: TCP
          port: 6333
    - to: []  # DNS
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
