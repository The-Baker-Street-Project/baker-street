apiVersion: apps/v1
kind: Deployment
metadata:
  name: ext-google-workspace
  namespace: bakerst
  labels:
    app: bakerst-extension
    extension: google-workspace
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bakerst-extension
      extension: google-workspace
  template:
    metadata:
      labels:
        app: bakerst-extension
        extension: google-workspace
    spec:
      initContainers:
        - name: copy-credentials
          image: busybox:1.36
          command: ["sh", "-c", "cp /secret-creds/*.json /creds/ 2>/dev/null || true"]
          volumeMounts:
            - name: google-cred-secret
              mountPath: /secret-creds
              readOnly: true
            - name: google-creds
              mountPath: /creds
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
      containers:
        - name: google-workspace
          image: bakerst-ext-google-workspace:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: GOOGLE_OAUTH_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: bakerst-google-secrets
                  key: GOOGLE_OAUTH_CLIENT_ID
            - name: GOOGLE_OAUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: bakerst-google-secrets
                  key: GOOGLE_OAUTH_CLIENT_SECRET
            - name: WORKSPACE_MCP_CREDENTIALS_DIR
              value: /app/store_creds
            - name: MCP_SINGLE_USER_MODE
              value: "1"
            - name: OAUTHLIB_INSECURE_TRANSPORT
              value: "1"
          volumeMounts:
            - name: google-creds
              mountPath: /app/store_creds
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
            seccompProfile:
              type: RuntimeDefault
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10

        - name: nats-sidecar
          image: bakerst-nats-sidecar:latest
          imagePullPolicy: Never
          env:
            - name: EXTENSION_ID
              value: google-workspace
            - name: EXTENSION_NAME
              value: Google Workspace
            - name: EXTENSION_DESCRIPTION
              value: Gmail, Drive, Calendar, and Docs tools via Google Workspace APIs
            - name: MCP_URL
              value: http://ext-google-workspace.bakerst.svc.cluster.local:8080/mcp
            - name: HEALTH_URL
              value: http://localhost:8080/health
            - name: NATS_URL
              value: nats://nats.bakerst.svc.cluster.local:4222
            - name: TAGS
              value: google,gmail,drive,calendar,docs,workspace
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          securityContext:
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
            seccompProfile:
              type: RuntimeDefault

      volumes:
        - name: google-creds
          emptyDir: {}
        - name: google-cred-secret
          secret:
            secretName: bakerst-google-cred-file
            optional: true
        - name: tmp
          emptyDir:
            sizeLimit: 100Mi
---
apiVersion: v1
kind: Service
metadata:
  name: ext-google-workspace
  namespace: bakerst
  labels:
    app: bakerst-extension
    extension: google-workspace
spec:
  selector:
    app: bakerst-extension
    extension: google-workspace
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
