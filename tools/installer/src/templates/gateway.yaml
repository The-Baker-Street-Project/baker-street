apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: {{NAMESPACE}}
  labels:
    app: gateway
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: fix-data-ownership
          image: alpine:3
          command: ["chown", "-R", "1000:1000", "/data"]
          securityContext:
            runAsNonRoot: false
            runAsUser: 0
          volumeMounts:
            - name: data
              mountPath: /data
      containers:
        - name: gateway
          image: {{IMAGE_GATEWAY}}
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          ports:
            - containerPort: 3001
              name: admin
            - containerPort: 3002
              name: voice
          env:
            - name: BRAIN_URL
              value: "http://brain.{{NAMESPACE}}.svc.cluster.local:3000"
            - name: DATA_DIR
              value: "/data"
            - name: DOOR_POLICY
              value: "{{DOOR_POLICY}}"
            - name: VOICE_PORT
              value: "3002"
{{GATEWAY_FEATURE_VARS}}
          envFrom:
            - secretRef:
                name: bakerst-gateway-secrets
                optional: true
          volumeMounts:
            - name: data
              mountPath: /data
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          livenessProbe:
            httpGet:
              path: /ping
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /ping
              port: 3001
            initialDelaySeconds: 3
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: gateway-data
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: {{NAMESPACE}}
spec:
  selector:
    app: gateway
  ports:
    - port: 3001
      targetPort: 3001
      protocol: TCP
      name: admin
    - port: 3002
      targetPort: 3002
      protocol: TCP
      name: voice
