# Minimal install: Anthropic only, no optional features
# Credential values are placeholders — override with real tokens at runtime:
#   E2E_ANTHROPIC_API_KEY=sk-ant-... ./scripts/e2e-test.sh minimal

credentials:
  anthropic_api_key: "${E2E_ANTHROPIC_API_KEY}"

features: {}

verify:
  expected_pods:
    - brain
    - worker
    - gateway
    - ui
    - nats
    - qdrant
  chat_prompt: "List all your tools and capabilities. Be specific about what you can do."
  expected_capabilities: []
