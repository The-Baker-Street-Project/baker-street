# Scenario: Ollama Single Endpoint
# Tests: Local-only install with one Ollama instance.
# Requires: Ollama running on the host. Set OLLAMA_HOST to override
#           (default: host.docker.internal:11434).
# No cloud API keys needed.

namespace: bakerst-test
agentName: TestAgent

secrets:
  OLLAMA_ENDPOINTS: "${OLLAMA_HOST:-host.docker.internal:11434}"
  DEFAULT_MODEL: "qwen2.5-coder:32b"
  WORKER_MODEL: "qwen3.5:9b"
  OBSERVER_MODEL: "qwen3.5:9b"
  REFLECTOR_MODEL: "qwen2.5-coder:32b"
  AUTH_TOKEN: auto
  AGENT_NAME: TestAgent

features:
  telegram: false
  discord: false
  github: false
  perplexity: false
  obsidian: false
  voice: false
  google-workspace: false
  voyage: false

verify:
  expectedPods:
    - brain-blue
    - worker
    - ui
    - gateway
    - nats
    - qdrant
  chatPrompt: "Respond with exactly: SCENARIO_TEST_PASSED"
  timeoutSeconds: 300
