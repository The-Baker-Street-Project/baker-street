# test/acceptance/test-config.yaml
# Used by CI acceptance test and local validation.
# Secrets reference env vars that CI provides via GitHub Actions secrets.
namespace: bakerst
agentName: Baker

secrets:
  ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
  OBSERVER_MODEL: "claude-haiku-4-5-20251001"
  REFLECTOR_MODEL: "claude-sonnet-4-20250514"
  AUTH_TOKEN: auto
  AGENT_NAME: Baker

features:
  telegram: false
  discord: false
  github: false
  obsidian: false
  voice: false
  google-workspace: false

verify:
  expectedPods:
    - brain-blue
    - worker
    - ui
    - nats
    - qdrant
  chatPrompt: "Respond with exactly: ACCEPTANCE_TEST_PASSED"
  timeoutSeconds: 180
