name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.5.1)'
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/the-baker-street-project/bakerst

permissions:
  contents: write
  packages: write

jobs:
  # ─── Stage 1: Extract version ───────────────────────────────────────
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Determine version
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [[ -n "$INPUT_VERSION" ]]; then
            V="$INPUT_VERSION"
          else
            V="$REF_NAME"
          fi
          # Strip leading 'v' if present
          V="${V#v}"
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "Version: $V"

  # ─── Stage 2: Native AMD64 image builds ─────────────────────────────
  build-image-amd64:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: brain
            dockerfile: services/brain/Dockerfile
            context: .
          - name: worker
            dockerfile: services/worker/Dockerfile
            context: .
          - name: ui
            dockerfile: services/ui/Dockerfile
            context: .
          - name: gateway
            dockerfile: services/gateway/Dockerfile
            context: .
          - name: nats-sidecar
            dockerfile: packages/nats-sidecar/Dockerfile
            context: packages/nats-sidecar
          - name: ext-toolbox
            dockerfile: examples/extension-toolbox/Dockerfile
            context: .
          - name: ext-browser
            dockerfile: examples/extension-browser/Dockerfile
            context: .
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (amd64)
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: true
          provenance: false
          platforms: linux/amd64
          tags: ${{ env.IMAGE_PREFIX }}-${{ matrix.service.name }}:${{ needs.prepare.outputs.version }}-amd64
          cache-from: type=gha,scope=${{ matrix.service.name }}-amd64
          cache-to: type=gha,mode=max,scope=${{ matrix.service.name }}-amd64

  # ─── Stage 3: Native ARM64 image builds ─────────────────────────────
  build-image-arm64:
    needs: prepare
    runs-on: ubuntu-24.04-arm
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: brain
            dockerfile: services/brain/Dockerfile
            context: .
          - name: worker
            dockerfile: services/worker/Dockerfile
            context: .
          - name: ui
            dockerfile: services/ui/Dockerfile
            context: .
          - name: gateway
            dockerfile: services/gateway/Dockerfile
            context: .
          - name: nats-sidecar
            dockerfile: packages/nats-sidecar/Dockerfile
            context: packages/nats-sidecar
          - name: ext-toolbox
            dockerfile: examples/extension-toolbox/Dockerfile
            context: .
          - name: ext-browser
            dockerfile: examples/extension-browser/Dockerfile
            context: .
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (arm64)
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: true
          provenance: false
          platforms: linux/arm64
          tags: ${{ env.IMAGE_PREFIX }}-${{ matrix.service.name }}:${{ needs.prepare.outputs.version }}-arm64
          cache-from: type=gha,scope=${{ matrix.service.name }}-arm64
          cache-to: type=gha,mode=max,scope=${{ matrix.service.name }}-arm64

  # ─── Stage 4: Create multi-arch manifests ────────────────────────────
  create-manifests:
    needs: [prepare, build-image-amd64, build-image-arm64]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - brain
          - worker
          - ui
          - gateway
          - nats-sidecar
          - ext-toolbox
          - ext-browser
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifest
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          SERVICE: ${{ matrix.service }}
        run: |
          IMAGE="${IMAGE_PREFIX}-${SERVICE}"
          docker manifest create "${IMAGE}:${VERSION}" \
            "${IMAGE}:${VERSION}-amd64" \
            "${IMAGE}:${VERSION}-arm64"
          docker manifest push "${IMAGE}:${VERSION}"

          docker manifest create "${IMAGE}:latest" \
            "${IMAGE}:${VERSION}-amd64" \
            "${IMAGE}:${VERSION}-arm64"
          docker manifest push "${IMAGE}:latest"

      - name: Make package public
        env:
          SERVICE: ${{ matrix.service }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api \
            --method PUT \
            -H "Accept: application/vnd.github+json" \
            /orgs/The-Baker-Street-Project/packages/container/bakerst-${SERVICE}/visibility \
            -f visibility=public \
          || echo "Warning: could not set package visibility (may already be public)"

  # ─── Stage 5: Build installer binaries ───────────────────────────────
  build-installer:
    needs: prepare
    runs-on: ${{ matrix.target.runner }}
    strategy:
      fail-fast: false
      matrix:
        target:
          - triple: x86_64-unknown-linux-gnu
            binary: bakerst-install-linux-amd64
            runner: ubuntu-latest
          - triple: aarch64-apple-darwin
            binary: bakerst-install-darwin-arm64
            runner: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target.triple }}

      - name: Build installer
        working-directory: tools/installer
        run: cargo build --release --target ${{ matrix.target.triple }}

      - name: Rename binary and generate checksum
        env:
          TARGET: ${{ matrix.target.triple }}
          BINARY_NAME: ${{ matrix.target.binary }}
        run: |
          cp "tools/installer/target/${TARGET}/release/bakerst-install" "$BINARY_NAME"
          if command -v sha256sum &>/dev/null; then
            sha256sum "$BINARY_NAME" > "${BINARY_NAME}.sha256"
          else
            shasum -a 256 "$BINARY_NAME" > "${BINARY_NAME}.sha256"
          fi

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.target.binary }}
          path: |
            ${{ matrix.target.binary }}
            ${{ matrix.target.binary }}.sha256

  # ─── Stage 6: Package release artifacts ──────────────────────────────
  package-artifacts:
    needs: [prepare, build-installer, create-manifests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download installer artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: installer-*
          merge-multiple: true

      - name: Read installer checksums
        id: checksums
        run: |
          if [[ -f "bakerst-install-linux-amd64.sha256" ]]; then
            SHA=$(cut -d' ' -f1 bakerst-install-linux-amd64.sha256)
            echo "linux_amd64_sha256=$SHA" >> "$GITHUB_OUTPUT"
          fi
          if [[ -f "bakerst-install-darwin-arm64.sha256" ]]; then
            SHA=$(cut -d' ' -f1 bakerst-install-darwin-arm64.sha256)
            echo "darwin_arm64_sha256=$SHA" >> "$GITHUB_OUTPUT"
          fi

      - name: Bundle install template
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: scripts/bundle-template.sh

      - name: Generate release manifest
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          SERVICES: "brain worker ui gateway nats-sidecar ext-toolbox ext-browser"
          INSTALLER_LINUX_AMD64_SHA256: ${{ steps.checksums.outputs.linux_amd64_sha256 }}
          INSTALLER_DARWIN_ARM64_SHA256: ${{ steps.checksums.outputs.darwin_arm64_sha256 }}
        run: scripts/generate-manifest.sh

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: |
            manifest.json
            install-template.tar.gz
            bakerst-install-linux-amd64
            bakerst-install-linux-amd64.sha256
            bakerst-install-darwin-arm64
            bakerst-install-darwin-arm64.sha256

  # ─── Stage 7: Acceptance test ────────────────────────────────────────
  acceptance-test:
    needs: [prepare, package-artifacts, create-manifests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: bakerst-test

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts

      - name: Pull images and load into kind
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          SERVICES="brain worker ui gateway nats-sidecar ext-toolbox ext-browser"
          for svc in $SERVICES; do
            IMAGE="${IMAGE_PREFIX}-${svc}:${VERSION}"
            docker pull "$IMAGE"
            kind load docker-image "$IMAGE" --name bakerst-test
          done

      - name: Make installer executable
        run: chmod +x bakerst-install-linux-amd64

      - name: Run installer with test config
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY || 'sk-ant-test-dummy-key-for-ci' }}
        run: |
          ./bakerst-install-linux-amd64 install \
            --config test/acceptance/test-config.yaml \
            --template install-template.tar.gz \
            --manifest manifest.json \
            --no-wait

      - name: Wait for core pods
        run: |
          kubectl wait --for=condition=ready pod -l app=brain -n bakerst --timeout=300s
          kubectl wait --for=condition=ready pod -l app=worker -n bakerst --timeout=300s
          kubectl wait --for=condition=ready pod -l app=ui -n bakerst --timeout=300s
          kubectl wait --for=condition=ready pod -l app=nats -n bakerst --timeout=300s

      - name: Smoke test — ping brain
        run: |
          kubectl port-forward svc/brain 3000:3000 -n bakerst &
          sleep 3
          curl -sf http://localhost:3000/ping || (echo "Brain ping failed"; exit 1)
          echo "Acceptance test passed"

      - name: Debug pod status on failure
        if: failure()
        run: |
          echo "=== Pod status ==="
          kubectl get pods -n bakerst -o wide
          echo ""
          echo "=== Events ==="
          kubectl get events -n bakerst --sort-by='.lastTimestamp' | tail -40
          echo ""
          for pod in $(kubectl get pods -n bakerst -o jsonpath='{.items[*].metadata.name}'); do
            STATUS=$(kubectl get pod "$pod" -n bakerst -o jsonpath='{.status.phase}')
            if [ "$STATUS" != "Running" ] && [ "$STATUS" != "Succeeded" ]; then
              echo "=== Describe $pod ==="
              kubectl describe pod "$pod" -n bakerst | tail -30
              echo ""
              echo "=== Logs $pod ==="
              kubectl logs "$pod" -n bakerst --tail=20 2>/dev/null || true
              echo ""
            fi
          done

  # ─── Stage 8: Publish GitHub Release ─────────────────────────────────
  publish-release:
    needs: [prepare, acceptance-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.prepare.outputs.version }}
          generate_release_notes: true
          files: |
            manifest.json
            install-template.tar.gz
            bakerst-install-linux-amd64
            bakerst-install-linux-amd64.sha256
            bakerst-install-darwin-arm64
            bakerst-install-darwin-arm64.sha256
