name: Release

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/the-baker-street-project/bakerst

permissions:
  contents: write
  packages: write
  id-token: write  # cosign keyless signing

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: brain
            dockerfile: services/brain/Dockerfile
            pkg-path: services/brain
            has-build-args: true
          - name: worker
            dockerfile: services/worker/Dockerfile
            pkg-path: services/worker
            has-build-args: false
          - name: ui
            dockerfile: services/ui/Dockerfile
            pkg-path: services/ui
            has-build-args: false
          - name: gateway
            dockerfile: services/gateway/Dockerfile
            pkg-path: services/gateway
            has-build-args: false
          - name: sysadmin
            dockerfile: services/sysadmin/Dockerfile
            pkg-path: services/sysadmin
            has-build-args: false
          - name: ext-utilities
            dockerfile: examples/extension-utilities/Dockerfile
            pkg-path: examples/extension-utilities
            has-build-args: false
          - name: ext-github
            dockerfile: examples/extension-github/Dockerfile
            pkg-path: examples/extension-github
            has-build-args: false
          - name: ext-obsidian
            dockerfile: examples/extension-obsidian/Dockerfile
            pkg-path: examples/extension-obsidian
            has-build-args: false
          - name: ext-toolbox
            dockerfile: examples/extension-toolbox/Dockerfile
            pkg-path: examples/extension-toolbox
            has-build-args: false
          - name: ext-browser
            dockerfile: examples/extension-browser/Dockerfile
            pkg-path: examples/extension-browser
            has-build-args: false
          - name: voice
            dockerfile: services/voice/Dockerfile
            pkg-path: services/voice
            has-build-args: false
          - name: nats-sidecar
            dockerfile: packages/nats-sidecar/Dockerfile
            pkg-path: packages/nats-sidecar
            has-build-args: false
          - name: ext-google-workspace
            dockerfile: examples/extension-google-workspace/Dockerfile
            pkg-path: examples/extension-google-workspace
            has-build-args: false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Install syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Read service version
        id: svc-version
        env:
          PKG_PATH: ${{ matrix.service.pkg-path }}
        run: |
          VERSION=$(node -e "console.log(require('./${PKG_PATH}/package.json').version)")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Compute build args
        id: build-args
        env:
          REF_NAME: ${{ github.ref_name }}
          HAS_BUILD_ARGS: ${{ matrix.service.has-build-args }}
        run: |
          if [ "$HAS_BUILD_ARGS" = "true" ]; then
            echo "args=BRAIN_VERSION=$REF_NAME" >> "$GITHUB_OUTPUT"
          else
            echo "args=" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE_PREFIX }}-${{ matrix.service.name }}:${{ steps.svc-version.outputs.version }}
            ${{ env.IMAGE_PREFIX }}-${{ matrix.service.name }}:latest
          build-args: ${{ steps.build-args.outputs.args }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Make package public
        env:
          SERVICE_NAME: ${{ matrix.service.name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api \
            --method PUT \
            -H "Accept: application/vnd.github+json" \
            /orgs/The-Baker-Street-Project/packages/container/bakerst-${SERVICE_NAME}/visibility \
            -f visibility=public \
          || echo "Warning: could not set package visibility (may already be public)"

      - name: Sign image with cosign
        env:
          IMAGE_REF: ${{ env.IMAGE_PREFIX }}-${{ matrix.service.name }}@${{ steps.build.outputs.digest }}
        run: cosign sign --yes "$IMAGE_REF"

      - name: Generate and attach SBOM
        env:
          IMAGE_REF: ${{ env.IMAGE_PREFIX }}-${{ matrix.service.name }}@${{ steps.build.outputs.digest }}
          SERVICE_NAME: ${{ matrix.service.name }}
        run: |
          syft "$IMAGE_REF" -o spdx-json > "sbom-${SERVICE_NAME}.spdx.json"
          cosign attach sbom --sbom "sbom-${SERVICE_NAME}.spdx.json" "$IMAGE_REF"

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.service.name }}
          path: sbom-${{ matrix.service.name }}.spdx.json

  build-installer:
    runs-on: ${{ matrix.target.runner }}
    strategy:
      fail-fast: false
      matrix:
        target:
          - triple: x86_64-unknown-linux-gnu
            binary: bakerst-install-linux-amd64
            runner: ubuntu-latest
            use-cross: false
          - triple: aarch64-unknown-linux-gnu
            binary: bakerst-install-linux-arm64
            runner: ubuntu-latest
            use-cross: true
          - triple: x86_64-apple-darwin
            binary: bakerst-install-darwin-amd64
            runner: macos-latest
            use-cross: false
          - triple: aarch64-apple-darwin
            binary: bakerst-install-darwin-arm64
            runner: macos-latest
            use-cross: false

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target.triple }}

      - name: Install cross (Linux ARM64)
        if: matrix.target.use-cross
        run: cargo install cross --locked

      - name: Build with cross
        if: matrix.target.use-cross
        working-directory: tools/installer
        run: cross build --release --target ${{ matrix.target.triple }}

      - name: Build with cargo
        if: ${{ !matrix.target.use-cross }}
        working-directory: tools/installer
        run: cargo build --release --target ${{ matrix.target.triple }}

      - name: Rename binary and generate checksum
        env:
          TARGET: ${{ matrix.target.triple }}
          BINARY_NAME: ${{ matrix.target.binary }}
        run: |
          cp "tools/installer/target/${TARGET}/release/bakerst-install" "$BINARY_NAME"
          if command -v sha256sum &> /dev/null; then
            sha256sum "$BINARY_NAME" > "${BINARY_NAME}.sha256"
          else
            shasum -a 256 "$BINARY_NAME" > "${BINARY_NAME}.sha256"
          fi

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.target.binary }}
            ${{ matrix.target.binary }}.sha256

  create-release:
    needs: [build-and-push, build-installer]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Attach manifest to release
        run: cp tools/installer/release-manifest.json release-manifest.json

      - name: Download SBOMs
        uses: actions/download-artifact@v4
        with:
          pattern: sbom-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-manifest.json
            sbom-*.spdx.json
